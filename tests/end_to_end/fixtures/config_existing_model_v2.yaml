# global settings
name: "test_8a_replica"
source_path: "."
output_folder: "./tests/end_to_end/outputs/"

# all settings in the system.json file with the exception of technology lists
system:
  set_nodes:
    - CH
    - DE

  reference_year: 2023
  unaggregated_time_steps_per_year: 96
  aggregated_time_steps_per_year: 96
  conduct_time_series_aggregation: false
  optimized_years: 1
  interval_between_years: 1
  use_rolling_horizon: false
  years_in_rolling_horizon: 1

# add and remove technologies/carriers from the model
elements:   
  insert:
    set_sectors: []
    set_conversion_technologies: 
      - natural_gas_boiler
      - photovoltaics
    set_transport_technologies:
      - natural_gas_pipeline
    set_storage_technologies:
      - natural_gas_storage
      - pumped_hydro
    set_retrofitting_technologies: []
    set_carriers: 
      - electricity
      - heat
      - natural_gas

  exclude:
    set_sectors: []
    set_conversion_technologies: []
    set_transport_technologies: []
    set_storage_technologies: []
    set_retrofitting_technologies: []
    set_carriers: []

# settings for individual data sources
data:
  datasets:
    ensoe_api:
      api_key: ""

# settings that go into the energy_system folder
energy_system:

  # parameters which not to interpolate
  parameters_interpolation_off:
    parameter_name: []

  # unit definitions
  units:
    base_units:
      - hour
      - megaEuro
      - km
      - megatons
      - GW

    definitions:
      Euro:
        dimension: currency
        aliases:
          - EURO
          - Eur
          - €







